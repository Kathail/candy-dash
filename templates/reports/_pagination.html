{# Reusable pagination for report pages. Expects: pagination, base_url, start, end #}
{% if pagination.pages > 1 %}
<div class="flex items-center justify-center gap-2 pt-2 pb-1">
  {% if pagination.has_prev %}
  <a href="{{ base_url }}?start_date={{ start.strftime('%Y-%m-%d') }}&end_date={{ end.strftime('%Y-%m-%d') }}&page={{ pagination.prev_num }}"
     class="px-3 py-1.5 text-xs font-medium text-indigo-400 hover:text-indigo-300 bg-panel border border-app rounded-lg btn-press">&larr; Prev</a>
  {% endif %}
  <span class="text-2xs text-faint">Page {{ pagination.page }} of {{ pagination.pages }}</span>
  {% if pagination.has_next %}
  <a href="{{ base_url }}?start_date={{ start.strftime('%Y-%m-%d') }}&end_date={{ end.strftime('%Y-%m-%d') }}&page={{ pagination.next_num }}"
     class="px-3 py-1.5 text-xs font-medium text-indigo-400 hover:text-indigo-300 bg-panel border border-app rounded-lg btn-press">Next &rarr;</a>
  {% endif %}
</div>
{% endif %}
