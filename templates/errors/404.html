{% extends "base.html" %}

{% block title %}Page Not Found - Candy Dash{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-16 px-4 text-center">
  <div class="text-6xl font-extrabold text-indigo-300 mb-4">404</div>
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Page Not Found</h1>
  <p class="text-gray-500 mb-8 max-w-md">
    The page you are looking for does not exist or may have been moved.
  </p>
  <a href="{{ url_for('dashboard.index') }}"
     class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 min-h-[44px] transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
    </svg>
    Back to Dashboard
  </a>
</div>
{% endblock %}
