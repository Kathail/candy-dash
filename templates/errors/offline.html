<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>Offline - Candy Dash</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      color: #1f2937;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      color: #6366f1;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    p { font-size: .9375rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: .75rem 1.5rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: .5rem;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      min-height: 44px;
      min-width: 44px;
      transition: background .15s;
    }
    .btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01"/>
    </svg>
    <h1>You Are Offline</h1>
    <p>
      It looks like you have lost your internet connection.
      Some features may be unavailable until you reconnect.
    </p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
