{# Global Payment Modal #}
<div x-data="paymentModal()" @open-payment-modal.window="openModal($event.detail)"
     x-show="isOpen" x-cloak role="dialog" aria-modal="true" aria-label="Record Payment" class="fixed inset-0 z-[70] flex items-center justify-center p-4">

    {# Backdrop #}
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         @click="close()" class="absolute inset-0 bg-black/60"></div>

    {# Panel #}
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
         class="relative theme-card rounded-xl shadow-2xl w-full max-w-md p-6">

        <h2 class="text-lg font-bold mb-4">Record Payment</h2>

        <form @submit.prevent="submit()">
            <div class="mb-4">
                <label for="payment-customer" class="block text-sm font-medium text-muted mb-1">Customer</label>
                <div class="relative">
                    <input type="text" id="payment-customer" x-model="customerQuery" @input.debounce.300ms="searchCustomers()"
                           @focus="custDropdown = customerQuery.length > 0"
                           :placeholder="selectedCustomer ? selectedCustomer.name : 'Search customer...'"
                           class="theme-input rounded-lg min-h-[44px]" />
                    <div x-show="custDropdown && custResults.length > 0" @click.outside="custDropdown = false" x-cloak
                         class="absolute top-full mt-1 w-full theme-card max-h-48 overflow-y-auto z-10 shadow-lg">
                        <template x-for="c in custResults" :key="c.id">
                            <button type="button" @click="selectCustomer(c)"
                                    class="w-full text-left px-4 py-2.5 hover:bg-panel-hover text-sm min-h-[44px]">
                                <span x-text="c.name" class="font-medium"></span>
                                <span class="text-muted ml-1" x-text="c.city ? '(' + c.city + ')' : ''"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>

            <div x-show="selectedCustomer && selectedCustomer.balance > 0" x-cloak class="mb-4 px-3 py-2 bg-amber-500/10 border border-amber-500/20 rounded-lg">
                <div class="flex items-center justify-between">
                    <span class="text-xs text-amber-400">Current Balance</span>
                    <span class="text-sm font-bold text-amber-400" x-text="'$' + Number(selectedCustomer?.balance || 0).toFixed(2)"></span>
                </div>
            </div>

            <div class="mb-4">
                <label for="payment-amount" class="block text-sm font-medium text-muted mb-1">Amount ($)</label>
                <input type="number" id="payment-amount" step="0.01" min="0.01" x-model="amount" required
                       class="theme-input rounded-lg min-h-[44px]" />
            </div>

            <div class="mb-5">
                <label for="payment-notes" class="block text-sm font-medium text-muted mb-1">Notes</label>
                <textarea id="payment-notes" x-model="notes" rows="2" class="theme-input rounded-lg"></textarea>
            </div>

            <div class="flex gap-3">
                <button type="button" @click="close()" class="btn-press theme-btn-secondary flex-1 rounded-lg min-h-[44px]">
                    Cancel
                </button>
                <button type="submit" :disabled="submitting || !selectedCustomer"
                        class="btn-press theme-btn-primary flex-1 rounded-lg min-h-[44px] disabled:opacity-50">
                    <span x-show="!submitting">Record Payment</span>
                    <span x-show="submitting">Saving...</span>
                </button>
            </div>
        </form>
    </div>
</div>
