{% if customers %}
<div class="space-y-2">
  {% for item in customers %}
  {% set customer = item.customer %}
  {% set bucket = item.bucket %}
  <div class="bg-panel rounded-xl border border-app overflow-hidden animate-fade-in-up stagger-{{ loop.index0 % 8 + 1 }}" x-data="{ showPay: false }">
    <a href="{{ url_for('customers.profile', id=customer.id) }}"
       class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700/30 transition-colors btn-press">
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-gray-100 truncate">{{ customer.name }}</p>
        <p class="text-2xs text-gray-500">{{ customer.city or 'No city' }}</p>
      </div>
      <span class="text-sm font-bold text-amber-400 flex-shrink-0">{{ customer.balance | currency }}</span>
      <span class="px-2 py-0.5 text-2xs font-semibold rounded-full flex-shrink-0
                   {{ 'bg-green-500/20 text-green-400' if bucket == '0-30'
                      else 'bg-yellow-500/20 text-yellow-400' if bucket == '31-60'
                      else 'bg-orange-500/20 text-orange-400' if bucket == '61-90'
                      else 'bg-red-500/20 text-red-400' }}">{{ bucket }}d</span>
      <button @click.prevent.stop="showPay = !showPay" aria-label="Record payment"
              class="p-2 rounded-lg bg-green-600 text-white hover:bg-green-500 transition-colors btn-press flex-shrink-0 min-w-[44px] min-h-[44px] flex items-center justify-center">
        <span aria-hidden="true" class="text-sm font-black">$</span>
      </button>
    </a>

    {# Payment form #}
    <div x-show="showPay" x-transition.duration.200ms x-cloak class="px-4 pb-4 pt-1 border-t border-app">
      <form method="post" action="{{ url_for('customers.record_payment', id=customer.id) }}"
            class="flex flex-col gap-2" x-data="{ submitting: false }" @submit="submitting = true">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ url_for('balances.index') }}">
        <div class="flex gap-2">
          <input type="number" name="amount_sold" step="0.01" min="0" inputmode="decimal" placeholder="Sold $"
                 class="flex-1 theme-input rounded-xl text-sm min-h-[44px]">
          <input type="number" name="amount_paid" step="0.01" min="0" inputmode="decimal" placeholder="Paid $"
                 class="flex-1 theme-input rounded-xl text-sm min-h-[44px]">
          <select name="payment_type" aria-label="Payment type"
                  class="theme-input rounded-xl text-sm min-h-[44px]">
            <option value="cash">Cash</option>
            <option value="cheque">Cheque</option>
            <option value="etransfer">E-Transfer</option>
            <option value="debit">Debit</option>
            <option value="credit">Credit</option>
            <option value="scholtens">Scholtens</option>
            <option value="other">Other</option>
          </select>
        </div>
        <input type="text" name="notes" placeholder="Notes (optional)" aria-label="Payment notes"
               class="w-full theme-input rounded-xl text-sm min-h-[44px]">
        <button type="submit" :disabled="submitting"
                class="w-full inline-flex items-center justify-center gap-2 px-3 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-500 transition-colors min-h-[44px] btn-press disabled:opacity-50">
          <svg aria-hidden="true" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          <span x-text="submitting ? 'Saving...' : 'Record Payment'">Record Payment</span>
        </button>
      </form>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="bg-panel rounded-xl border border-app p-10 text-center animate-fade-in-up">
  <p class="text-sm text-gray-500">No outstanding balances.</p>
</div>
{% endif %}
