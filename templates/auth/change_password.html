{% extends "base.html" %}

{% block title %}Change Password - Candy Dash{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Change Password</h1>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6" x-data="{ newPw: '' }">
    <form method="POST" action="{{ url_for('auth.change_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label for="old_password" class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
        <input type="password" id="old_password" name="old_password" required autocomplete="current-password"
               class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 min-h-[44px]">
      </div>

      <div class="mb-1">
        <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" id="new_password" name="new_password" required autocomplete="new-password"
               x-model="newPw" minlength="12"
               class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 min-h-[44px]">
      </div>
      <p class="text-xs mb-4"
         :class="newPw.length === 0 ? 'text-gray-400' : newPw.length >= 12 ? 'text-green-600' : 'text-red-500'">
        <span x-show="newPw.length > 0 && newPw.length < 12">Password must be at least 12 characters.</span>
        <span x-show="newPw.length >= 12">Password length is good.</span>
        <span x-show="newPw.length === 0">Minimum 12 characters required.</span>
      </p>

      <div class="mb-6">
        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password"
               minlength="12"
               class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 min-h-[44px]">
      </div>

      <div class="flex gap-3">
        <a href="{{ url_for('dashboard.index') }}"
           class="flex-1 text-center px-4 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 min-h-[44px] flex items-center justify-center">
          Cancel
        </a>
        <button type="submit"
                class="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 min-h-[44px] transition-colors">
          Update Password
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
