<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1220">
  <title>Login - Candy Dash</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
  <script defer src="{{ url_for('static', filename='vendor/alpine.min.js') }}"></script>
</head>
<body class="h-full bg-gradient-to-br from-gray-950 to-gray-900 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    {# Logo / Title #}
    <div class="text-center mb-8">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Northern Sweet Supply" class="w-20 h-20 mx-auto mb-4 rounded-2xl object-contain">
      <h1 class="text-2xl font-bold text-white">Candy Dash</h1>
      <p class="text-indigo-200 text-sm mt-1">Candy Route Planner</p>
    </div>

    {# Flash messages #}
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="mb-4 rounded-lg px-4 py-3 text-sm
                    {{ 'bg-green-500/20 text-green-400 border border-green-500/30' if cat == 'success'
                       else 'bg-red-500/20 text-red-400 border border-red-500/30' if cat == 'error'
                       else 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30' if cat == 'warning'
                       else 'bg-blue-500/20 text-blue-400 border border-blue-500/30' }}">
          {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    {# Login card #}
    <div class="bg-gray-800 rounded-2xl shadow-xl p-6 sm:p-8">
      <h2 class="text-lg font-semibold text-gray-100 mb-6 text-center">Sign in to your account</h2>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-4">
          <label for="username" class="block text-sm font-medium text-gray-400 mb-1">Username</label>
          <input type="text" id="username" name="username" required autofocus autocomplete="username"
                 class="w-full bg-gray-700 border border-gray-600 text-gray-200 placeholder-gray-500 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 min-h-[44px]">
        </div>

        <div class="mb-6" x-data="{ showPw: false }">
          <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Password</label>
          <div class="relative">
            <input :type="showPw ? 'text' : 'password'" id="password" name="password" required autocomplete="current-password"
                   class="w-full bg-gray-700 border border-gray-600 text-gray-200 placeholder-gray-500 rounded-lg px-3 py-2.5 pr-10 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 min-h-[44px]">
            <button type="button" @click="showPw = !showPw" class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-gray-500 hover:text-gray-300" tabindex="-1">
              <svg x-show="!showPw" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="showPw" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center mb-6">
          <input type="checkbox" id="remember" name="remember" value="1"
                 class="w-5 h-5 text-indigo-600 border-gray-600 rounded focus:ring-indigo-500 bg-gray-700">
          <label for="remember" class="ml-2 text-sm text-gray-400">Remember me</label>
        </div>

        <button type="submit"
                class="btn-press w-full bg-indigo-600 text-white rounded-lg px-4 py-2.5 text-sm font-semibold hover:bg-indigo-500 focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 min-h-[44px] transition-colors">
          Sign In
        </button>
      </form>

      <div class="mt-4 pt-4 border-t border-gray-700">
        <a href="{{ url_for('auth.demo') }}"
           class="btn-press w-full inline-flex items-center justify-center gap-2 bg-gray-700 border border-gray-600 text-gray-300 rounded-lg px-4 py-2.5 text-sm font-medium hover:bg-gray-600 min-h-[44px] transition-colors">
          <svg aria-hidden="true" class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a9 9 0 11-18 0 9 9 0 0118 0z M10 8l6 4-6 4V8z"/>
          </svg>
          Try Demo
        </a>
      </div>
    </div>
  </div>

</body>
</html>
