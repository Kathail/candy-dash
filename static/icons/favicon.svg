<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Candy wrapper shape -->
  <defs>
    <linearGradient id="candy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Left wrapper twist -->
  <polygon points="6,28 16,24 16,40 6,36" fill="#a5b4fc" opacity="0.8"/>
  <line x1="6" y1="32" x2="16" y2="28" stroke="#818cf8" stroke-width="1"/>
  <line x1="6" y1="32" x2="16" y2="36" stroke="#818cf8" stroke-width="1"/>
  <!-- Right wrapper twist -->
  <polygon points="58,28 48,24 48,40 58,36" fill="#a5b4fc" opacity="0.8"/>
  <line x1="58" y1="32" x2="48" y2="28" stroke="#818cf8" stroke-width="1"/>
  <line x1="58" y1="32" x2="48" y2="36" stroke="#818cf8" stroke-width="1"/>
  <!-- Candy body -->
  <rect x="16" y="20" width="32" height="24" rx="6" fill="url(#candy-grad)"/>
  <!-- Stripe details on candy -->
  <line x1="24" y1="20" x2="24" y2="44" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="32" y1="20" x2="32" y2="44" stroke="#c7d2fe" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="20" x2="40" y2="44" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <!-- Route dots (delivery points) -->
  <circle cx="20" cy="54" r="2.5" fill="#4f46e5"/>
  <circle cx="32" cy="54" r="2.5" fill="#4f46e5"/>
  <circle cx="44" cy="54" r="2.5" fill="#4f46e5"/>
  <!-- Connecting route line -->
  <line x1="22.5" y1="54" x2="29.5" y2="54" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="34.5" y1="54" x2="41.5" y2="54" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="2,2"/>
</svg>
